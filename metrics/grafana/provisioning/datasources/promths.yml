apiVersion: 1

datasources:
  - name: Prometheus          
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true           # сделает Prometheus источником по умолчанию
    editable: true
    uid: prometheus-test-devops-task    
    jsonData:
      timeInterval: "10s"     
      httpMethod: "POST"
    version: 1
