[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  debug = false
  quiet = false
  logfile = ""
  hostname = ""



[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  timeout = "5s"
  container_name_include = ["task-app", "task-front", "task-db"]


# Шоб Prometheus мог читать
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2 
